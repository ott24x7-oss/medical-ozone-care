<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Medical Ozone Care</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { background: #eef4f7; }
    .admin-shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
    .side { background: var(--navy-d); color: #c5d6df; padding: 22px 16px; position: sticky; top: 0; height: 100vh; overflow:auto; }
    .side .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; }
    .side .brand img { height: 38px; }
    .side .brand b { color: #fff; font-family: var(--display); }
    .side nav { display: grid; gap: 4px; }
    .side nav button { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: none; border: 0; color: #b9cad4; font: inherit; font-weight: 600; padding: 12px 14px; border-radius: 10px; cursor: pointer; transition: .15s; }
    .side nav button svg { width: 18px; height: 18px; }
    .side nav button:hover { background: rgba(255,255,255,.06); color: #fff; }
    .side nav button.active { background: var(--teal-d); color: #fff; }
    .side .sout { margin-top: 18px; }
    .main { padding: 26px clamp(18px,3vw,40px); max-width: 1180px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .topbar h1 { font-size: 1.7rem; margin: 0; }
    .who { color: var(--muted); font-size: .9rem; }
    .a-stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 16px; margin-bottom: 26px; }
    .a-stat { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); }
    .a-stat .n { font-family: var(--display); font-weight: 800; font-size: 2rem; color: var(--teal-d); }
    .a-stat .l { color: var(--muted); font-size: .9rem; font-weight: 600; }
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-sm); padding: 20px; margin-bottom: 20px; }
    .panel h2 { font-size: 1.15rem; margin: 0 0 14px; }
    .a-table { width: 100%; border-collapse: collapse; }
    .a-table th, .a-table td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line); font-size: .9rem; vertical-align: top; }
    .a-table th { background: #f3fafb; color: var(--navy); font-weight: 700; position: sticky; top: 0; }
    .a-table img { height: 40px; width: 54px; object-fit: contain; background: var(--grad-soft); border-radius: 6px; }
    .a-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .mini { padding: 7px 12px; font-size: .82rem; border-radius: 9px; }
    .pill { padding: 3px 10px; border-radius: 100px; font-size: .76rem; font-weight: 700; display: inline-block; }
    .pill.active, .pill.New { background: #e6f8f4; color: var(--teal-d); }
    .pill.inactive { background: #eef1f4; color: var(--muted); }
    .pill.Contacted { background: #fff7e8; color: var(--amber); }
    .pill.Quoted { background: #eaf2ff; color: var(--blue); }
    .pill.Closed { background: #eef9f2; color: var(--green); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fld { margin-bottom: 12px; }
    .fld label { display: block; font-weight: 600; font-size: .85rem; color: var(--navy); margin-bottom: 5px; }
    .fld input, .fld select, .fld textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font: inherit; font-size: .92rem; }
    .fld textarea { min-height: 80px; resize: vertical; }
    .fld .hint { color: var(--muted); font-size: .78rem; margin-top: 3px; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; }
    .thumbs .t { position: relative; width: 80px; height: 64px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--grad-soft); }
    .thumbs .t img { width: 100%; height: 100%; object-fit: contain; }
    .thumbs .t button { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 6px; border: 0; background: rgba(0,0,0,.55); color: #fff; cursor: pointer; }
    .modal-bg { position: fixed; inset: 0; background: rgba(8,42,60,.5); display: none; align-items: flex-start; justify-content: center; padding: 30px 16px; z-index: 50; overflow: auto; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 18px; max-width: 760px; width: 100%; box-shadow: var(--shadow-lg); }
    .modal header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; border-radius: 18px 18px 0 0; }
    .modal .body { padding: 22px; }
    .modal footer { padding: 16px 22px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: #fff; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy-d); color: #fff; padding: 12px 22px; border-radius: 100px; box-shadow: var(--shadow-lg); z-index: 80; opacity: 0; transition: opacity .25s, transform .25s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.err { background: var(--danger); }
    @media (max-width: 820px) { .admin-shell { grid-template-columns: 1fr; } .side { position: static; height: auto; } .side nav { grid-auto-flow: column; overflow-x: auto; } .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login" style="min-height:100vh;display:grid;place-items:center;padding:20px">
    <div class="form-card" style="max-width:400px;width:100%">
      <div style="text-align:center;margin-bottom:8px"><img src="/assets/img/logo.svg" alt="Medical Ozone Care" style="height:46px;margin:0 auto"></div>
      <h3 style="text-align:center;margin:6px 0 4px">Admin sign-in</h3>
      <p class="form-note" style="text-align:center;margin-bottom:18px">Sign in to manage products &amp; enquiries.</p>
      <div class="form-msg" id="loginMsg"></div>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="admin email" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="password" type="password" placeholder="password" autocomplete="current-password"></div>
      <button class="btn btn-primary btn-block btn-lg" id="loginBtn">Sign in</button>
    </div>
  </div>

  <!-- APP -->
  <div class="admin-shell" id="app" hidden>
    <aside class="side">
      <div class="brand"><img src="/assets/img/logo-light.svg" alt="Medical Ozone Care"></div>
      <nav id="nav">
        <button data-view="dashboard" class="active"><span data-icon="gauge"></span> Dashboard</button>
        <button data-view="products"><span data-icon="badge"></span> Products</button>
        <button data-view="enquiries"><span data-icon="mail"></span> Enquiries</button>
        <button data-view="brochures"><span data-icon="doc"></span> Brochures</button>
        <button data-view="contact"><span data-icon="phone"></span> Contact Settings</button>
        <button data-view="seo"><span data-icon="globe"></span> SEO Settings</button>
        <button data-view="legal"><span data-icon="shield"></span> Legal Pages</button>
      </nav>
      <div class="sout">
        <a href="/" class="btn btn-outline btn-block mini" style="margin-bottom:8px" target="_blank">View site ↗</a>
        <button class="btn btn-outline btn-block mini" id="logoutBtn">Sign out</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <span class="who" id="who"></span>
      </div>
      <div id="view"></div>
    </main>
  </div>

  <!-- product modal -->
  <div class="modal-bg" id="modalBg"><div class="modal"><header><h3 id="modalTitle" style="margin:0">Product</h3><button class="btn btn-outline mini" id="modalClose">Close</button></header><div class="body" id="modalBody"></div><footer><button class="btn btn-outline" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSave">Save</button></footer></div></div>
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
