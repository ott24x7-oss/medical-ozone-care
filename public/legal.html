<!DOCTYPE html>

  <style>
    .legal-doc { max-width: 820px; margin: 0 auto; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: clamp(26px,4vw,48px); box-shadow: var(--shadow); }

    .legal-nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 30px; }
    .legal-nav a { padding: 8px 16px; border-radius: 100px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-weight: 600; font-size: .9rem; }
    .legal-nav a.active, .legal-nav a:hover { background: var(--teal-d); color: #fff; border-color: var(--teal-d); }

      </nav>
      <article class="legal-doc" id="doc"><div class="skeleton" style="height:300px"></div></article>
    </div>

  <div id="site-footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/legal.js"></script>
