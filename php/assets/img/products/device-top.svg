<text x="456" y="86" font-family="Arial" font-size="12" font-weight="700" fill="#0B3A52">Operation</text>
<text x="456" y="108" font-family="Arial" font-size="9.5" fill="#6B7884">1. Press M1 or M2 to set mode.</text>
<text x="456" y="126" font-family="Arial" font-size="9.5" fill="#6B7884">2. Adjust oxygen flow on regulator.</text>
<text x="456" y="144" font-family="Arial" font-size="9.5" fill="#6B7884">3. Press L1–L6 for the level you need.</text>
<text x="456" y="162" font-family="Arial" font-size="9.5" fill="#6B7884">4. Wait ~30s for stable ozone output.</text>
<text x="456" y="180" font-family="Arial" font-size="9.5" fill="#6B7884">Unused ozone routes to destructor port.</text>
